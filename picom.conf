#################################
#             Backend           #
#################################
backend = "glx";
glx-copy-from-front = false;
use-damage = true;
vsync = true;

#################################
#            Corners            #
#################################
corner-radius = 10;

rounded-corners-exclude = [
  "class_g = 'Rofi'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#             Shadows           #
#################################
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.5;
shadow-exclude = [
  "class_g = 'Rofi'",
  "_GTK_FRAME_EXTENTS@"
];

#################################
#           Fading              #
#################################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

#################################
#   Transparency & Opacity      #
#################################
# Membuat Alacritty transparan sedikit saja (90% terlihat, 10% transparan)
opacity-rule = [
  "92:class_g = 'Alacritty' && !focused",
  "80:class_g = 'Alacritty' && focused",
  "100:class_g = 'Rofi'"
];

#################################
#             Blur              #
#################################
blur: {
  method = "dual_kawase";
  strength = 7;      # Kekuatan blur (semakin tinggi semakin buram)
  background = true;
  background-frame = false;
  background-fixed = false;
}

# Jangan blur wallpaper jika tidak perlu
blur-background-exclude = [
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@"
];

#################################
#       General Settings        #
#################################
mark-wmwin-focused = true;
mark-ovlp-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
dbe = false;
unredir-if-possible = false;
focus-exclude = [ "class_g = 'Cairo-clock'" ];
detect-transient = true;
detect-client-leader = true;
invert-color-include = [ ];
